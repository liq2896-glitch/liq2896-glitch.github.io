<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>本命鉴定 · 抽象人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .floating-emoji {
            position: fixed;
            font-size: 2.5rem;
            pointer-events: none;
            z-index: 0;
            animation: floatEmoji 15s infinite linear;
            opacity: 0.3;
        }

        @keyframes floatEmoji {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
            background: rgba(255,255,255,0.6);
            border-radius: 80px;
            padding: 25px 20px;
            backdrop-filter: blur(5px);
        }

        .header h1 {
            font-size: 3rem;
            color: #c0392b;
            text-shadow: 4px 4px 0 #f1c40f;
            letter-spacing: 4px;
        }

        .header .sub {
            color: #e67e22;
            font-size: 1rem;
            margin-top: 8px;
            font-weight: bold;
        }

        .progress-area {
            margin-bottom: 25px;
            background: rgba(255,255,255,0.6);
            border-radius: 40px;
            padding: 15px 20px;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            color: #c0392b;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .progress-bar-bg {
            background: #f5e6d3;
            border-radius: 30px;
            height: 16px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.3s;
        }

        .card {
            background: rgba(255, 248, 235, 0.96);
            border-radius: 50px;
            padding: 40px 35px;
            border: 4px solid #f1c40f;
            box-shadow: 0 15px 0 #e67e22;
            transition: all 0.2s;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .question-num {
            background: #f1c40f;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #c0392b;
        }

        .question-cat {
            background: #ffeaa7;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #e67e22;
            font-weight: bold;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .score-options {
            display: flex;
            gap: 12px;
            justify-content: space-between;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .score-btn {
            flex: 1;
            min-width: 70px;
            background: #fef9e6;
            border: 3px solid #f1c40f;
            border-radius: 50px;
            padding: 15px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .score-btn:hover {
            transform: scale(1.05);
            background: #ffeaa7;
        }

        .score-btn.selected {
            background: #f1c40f;
            border-color: #e67e22;
            transform: scale(1.02);
        }

        .score-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #c0392b;
        }

        .score-label {
            font-size: 0.8rem;
            color: #e67e22;
            font-weight: bold;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 35px;
        }

        .btn {
            flex: 1;
            padding: 16px 25px;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-prev {
            background: #ecf0f1;
            color: #7f8c8d;
            border: 2px solid #bdc3c7;
        }

        .btn-next {
            background: #f39c12;
            color: white;
            border: 2px solid #e67e22;
            text-shadow: 1px 1px 0 #c0392b;
        }

        .result-card {
            text-align: center;
        }

        .funny-face {
            font-size: 8rem;
            margin: 15px 0;
            filter: drop-shadow(6px 8px 0 #f1c40f);
            animation: wiggle 0.5s ease-out;
        }

        @keyframes wiggle {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            50% { transform: rotate(-10deg); }
            100% { transform: rotate(0deg); }
        }

        /* 抽象代号 - 大号显示 */
        .abstract-code {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c0392b, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            margin: 15px 0;
            font-family: monospace;
        }

        .personality-name {
            font-size: 1.8rem;
            color: #c0392b;
            background: #ffeaa7;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 60px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .funny-desc {
            background: #fef9e6;
            border-radius: 35px;
            padding: 25px;
            text-align: left;
            margin: 25px 0;
            border-left: 10px solid #f1c40f;
        }

        .funny-desc p {
            margin: 12px 0;
            color: #2c3e50;
            line-height: 1.7;
            font-size: 1.05rem;
        }

        .funny-desc .quote {
            font-style: italic;
            color: #e67e22;
            margin-top: 18px;
            font-size: 1rem;
            font-weight: bold;
        }

        .trait-bubbles {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 25px 0;
        }

        .trait-bubble {
            background: #ffeaa7;
            border-radius: 40px;
            padding: 8px 22px;
            font-size: 0.95rem;
            color: #c0392b;
            font-weight: bold;
        }

        .restart-btn {
            background: #f39c12;
            border: none;
            color: white;
            width: 100%;
            padding: 18px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            font-family: inherit;
            border-bottom: 5px solid #e67e22;
        }

        .restart-btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        @media (max-width: 600px) {
            .card {
                padding: 25px 20px;
            }
            .question-text {
                font-size: 1.4rem;
            }
            .score-value {
                font-size: 1.3rem;
            }
            .score-btn {
                min-width: 55px;
                padding: 10px 5px;
            }
            .funny-face {
                font-size: 5rem;
            }
            .abstract-code {
                font-size: 1.6rem;
            }
            .personality-name {
                font-size: 1.3rem;
            }
            .header h1 {
                font-size: 2.2rem;
            }
        }

        .fade-in {
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-fill" style="width: ${progress}%"></div>
                    </div>
                </div>
                <div class="card fade-in">
                    <div class="question-header">
                        <span class="question-num">🎭 灵魂拷问</span>
                        <span class="question-cat">${q.left}  ⇄  ${q.right}</span>
                    </div>
                    <div class="question-text">${q.text}</div>
                    <div class="score-options">
                        ${scoreBtns}
                    </div>
                    <div class="nav-buttons">
                        ${currentIndex > 0 ? '<button class="btn btn-prev" onclick="prevQuestion()">◀ 上一题</button>' : '<div style="flex:1"></div>'}
                        <button class="btn btn-next" onclick="nextQuestion()">${currentIndex === questions.length - 1 ? '🎉 鉴完收工 🎉' : '下一题 ▶'}</button>
                    </div>
                </div>
            `;
            app.innerHTML = html;
        }

        window.setAnswer = function(value) {
            answers[currentIndex] = value;
            renderQuestion();
        };

        window.prevQuestion = function() {
            if (currentIndex > 0) {
                currentIndex--;
                render();
            }
        };

        window.nextQuestion = function() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                render();
            } else {
                currentIndex++;
                render();
            }
        };

        function calculateAndRenderResult() {
            // 计算每个维度的平均分 (1-5分)
            let dim1Sum = 0, dim2Sum = 0, dim3Sum = 0, dim4Sum = 0;
            let dim1Count = 0, dim2Count = 0, dim3Count = 0, dim4Count = 0;
            
            for (let i = 0; i < questions.length; i++) {
                const score = answers[i];
                const dim = questions[i].dim;
                const mapped = score - 3; // -2到2
                if (dim === "dim1") { dim1Sum += mapped; dim1Count++; }
                else if (dim === "dim2") { dim2Sum += mapped; dim2Count++; }
                else if (dim === "dim3") { dim3Sum += mapped; dim3Count++; }
                else if (dim === "dim4") { dim4Sum += mapped; dim4Count++; }
            }
            
            // 确定每个维度的方向 (0=左倾向, 1=右倾向)
            const dim1 = (dim1Sum / dim1Count) >= 0 ? 1 : 0;  // 1=外向,0=内向
            const dim2 = (dim2Sum / dim2Count) >= 0 ? 1 : 0;  // 1=直觉,0=实感
            const dim3 = (dim3Sum / dim3Count) >= 0 ? 1 : 0;  // 1=情感,0=思考
            const dim4 = (dim4Sum / dim4Count) >= 0 ? 1 : 0;  // 1=感知,0=判断
            
            // 组合成4位二进制代码
            const code = `${dim1}${dim2}${dim3}${dim4}`;
            const result = personalities[code] || personalities["0111"];
            
            let traitsHtml = result.traits.map(t => `<span class="trait-bubble">#${t}</span>`).join('');
            
            const html = `
                <div class="card result-card fade-in">
                    <div class="funny-face">${result.face}</div>
                    <div class="abstract-code">${result.code}</div>
                    <div class="personality-name">${result.name}</div>
                    <div class="funny-desc">
                        <p>${result.desc}</p>
                        <div class="quote">${result.quote}</div>
                    </div>
                    <div class="trait-bubbles">
                        ${traitsHtml}
                    </div>
                    <button class="restart-btn" onclick="restartTest()">🔄 重新鉴定（不服再测）</button>
                </div>
            `;
            app.innerHTML = html;
        }

        window.restartTest = function() {
            currentIndex = 0;
            answers = new Array(questions.length).fill(3);
            render();
        };

        render();
    </script>
</body>
</html>
